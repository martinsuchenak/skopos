[log]
level = "info"
format = "text"

[server]
host = "0.0.0.0"
port = 8080

[database]
path = "skopos.db"

[auth]
api_key = ""

[health]
stuck_threshold_minutes = 15

[cleanup]
# Days to retain data before automatic cleanup (0 disables the cleanup worker).
retention_days = 30
