openapi: "3.1.0"
info:
  title: skopos
  version: "1.0.0"
  description: >
    Skopos coordinates AI agent status, a shared blackboard, and plans across
    sessions and branches.

    REST API, dashboard, and MCP (at `/mcp`) are all served on one HTTP server
    (default :8080).

    Read endpoints are open. Write endpoints require the configured API key,
    sent as `Authorization: Bearer <key>`.
    When no API key is configured, authentication is disabled.
servers:
  - url: http://localhost:8080
    description: Local development
paths:
  /health:
    get:
      summary: Health check
      operationId: healthCheck
      responses:
        "200":
          description: Service is healthy
          content:
            application/json:
              schema:
                type: object
                properties:
                  status: { type: string }
  /metrics:
    get:
      summary: Runtime metrics
      operationId: getMetrics
      responses:
        "200":
          description: Current metrics (goroutines, allocation)
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true

  # ---- status / sessions ----
  /api/reports:
    post:
      summary: Report an agent status update
      operationId: reportStatus
      security: [{ BearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/ReportInput" }
      responses:
        "201":
          description: Report accepted
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ReportResult" }
        "400": { description: Invalid report, content: { application/json: { schema: { $ref: "#/components/schemas/Error" } } } }
        "401": { description: Unauthorized }
  /api/sessions:
    get:
      summary: List sessions
      operationId: listSessions
      parameters:
        - name: workspace
          in: query
          schema: { type: string }
          description: Filter by workspace path/id.
      responses:
        "200":
          description: Session summaries
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/SessionSummary" }
  /api/sessions/{id}:
    get:
      summary: Get a session (with agents and events)
      operationId: getSession
      parameters:
        - { $ref: "#/components/parameters/SessionId" }
      responses:
        "200":
          description: Session detail
          content:
            application/json:
              schema: { $ref: "#/components/schemas/SessionDetail" }
        "404": { description: Session not found }
    delete:
      summary: Delete a session (cascades to its agents, events, and session-scoped blackboard entries)
      operationId: deleteSession
      security: [{ BearerAuth: [] }]
      parameters:
        - { $ref: "#/components/parameters/SessionId" }
      responses:
        "204": { description: Deleted }
        "401": { description: Unauthorized }
  /api/sessions/{id}/events:
    get:
      summary: List events for a session
      operationId: listSessionEvents
      parameters:
        - { $ref: "#/components/parameters/SessionId" }
      responses:
        "200":
          description: Session events (newest first)
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/Event" }

  # ---- workspaces ----
  /api/events/stream:
    get:
      summary: Server-Sent Events stream (live UI updates)
      operationId: eventStream
      description: >
        Returns a persistent text/event-stream. The server publishes named
        events (sessions, blackboard, plans, workspaces, change) whenever a
        successful mutation occurs. Clients use EventSource to subscribe and
        re-fetch the affected view on each event.
      responses:
        "200":
          description: SSE stream of change events
          content:
            text/event-stream:
              schema:
                type: string
                description: "Lines of event: <type> / data: <json> / blank"

  /api/workspaces:
    post:
      summary: Register a workspace (upserts the display name)
      operationId: createWorkspace
      security: [{ BearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/WorkspaceCreateInput" }
      responses:
        "201":
          description: Workspace registered
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Workspace" }
        "400": { description: Invalid input, content: { application/json: { schema: { $ref: "#/components/schemas/Error" } } } }
        "401": { description: Unauthorized }
    get:
      summary: List registered workspaces
      operationId: listWorkspaces
      responses:
        "200":
          description: Workspaces
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/Workspace" }
  /api/workspaces/{id}:
    delete:
      summary: Unregister a workspace (does not delete its sessions/entries/plans)
      operationId: deleteWorkspace
      security: [{ BearerAuth: [] }]
      parameters:
        - { name: id, in: path, required: true, schema: { type: string } }
      responses:
        "204": { description: Removed }
        "401": { description: Unauthorized }
        "404": { description: Not found }

  # ---- blackboard ----
  /api/blackboard/entries:
    post:
      summary: Write a blackboard entry
      operationId: blackboardWrite
      security: [{ BearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/BlackboardWriteInput" }
      responses:
        "201":
          description: Entry created
          content:
            application/json:
              schema: { $ref: "#/components/schemas/BlackboardWriteResult" }
        "400": { description: Invalid input, content: { application/json: { schema: { $ref: "#/components/schemas/Error" } } } }
        "401": { description: Unauthorized }
    get:
      summary: Read the knowledge bundle (entries + markdown)
      operationId: blackboardRead
      parameters:
        - { name: workspace, in: query, schema: { type: string } }
        - { name: branch, in: query, schema: { type: string } }
        - { name: session_id, in: query, schema: { type: string } }
      responses:
        "200":
          description: Knowledge bundle
          content:
            application/json:
              schema: { $ref: "#/components/schemas/BlackboardBundle" }
  /api/blackboard/entries/{id}/promote:
    patch:
      summary: Promote an entry to a wider scope (session -> branch -> project)
      operationId: blackboardPromote
      security: [{ BearerAuth: [] }]
      parameters:
        - { $ref: "#/components/parameters/EntryId" }
      responses:
        "204": { description: Promoted }
        "401": { description: Unauthorized }
        "404": { description: Entry not found }
        "409": { description: Already at project scope }
  /api/blackboard/entries/{id}:
    delete:
      summary: Delete a blackboard entry
      operationId: blackboardDelete
      security: [{ BearerAuth: [] }]
      parameters:
        - { $ref: "#/components/parameters/EntryId" }
      responses:
        "204": { description: Deleted }
        "401": { description: Unauthorized }
        "404": { description: Entry not found }

  # ---- plans ----
  /api/plans:
    post:
      summary: Create a plan
      operationId: createPlan
      security: [{ BearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/CreatePlanInput" }
      responses:
        "201":
          description: Plan created
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Plan" }
        "400": { description: Invalid input, content: { application/json: { schema: { $ref: "#/components/schemas/Error" } } } }
        "401": { description: Unauthorized }
    get:
      summary: List plans
      operationId: listPlans
      parameters:
        - { name: workspace, in: query, schema: { type: string } }
        - { name: branch, in: query, schema: { type: string } }
      responses:
        "200":
          description: Plans
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/Plan" }
  /api/plans/{id}:
    get:
      summary: Get a plan with all items and dependencies
      operationId: getPlan
      parameters: [{ $ref: "#/components/parameters/PlanId" }]
      responses:
        "200":
          description: Plan detail
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Plan" }
        "404": { description: Plan not found }
    patch:
      summary: Update a plan (name, description, status)
      operationId: updatePlan
      security: [{ BearerAuth: [] }]
      parameters: [{ $ref: "#/components/parameters/PlanId" }]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/UpdatePlanInput" }
      responses:
        "204": { description: Updated }
        "401": { description: Unauthorized }
        "404": { description: Plan not found }
    delete:
      summary: Delete a plan (cascades to items and dependencies)
      operationId: deletePlan
      security: [{ BearerAuth: [] }]
      parameters: [{ $ref: "#/components/parameters/PlanId" }]
      responses:
        "204": { description: Deleted }
        "401": { description: Unauthorized }
        "404": { description: Plan not found }
  /api/plans/{id}/items:
    post:
      summary: Add an item to a plan
      operationId: addPlanItem
      security: [{ BearerAuth: [] }]
      parameters: [{ $ref: "#/components/parameters/PlanId" }]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/CreateItemInput" }
      responses:
        "201":
          description: Item added
          content:
            application/json:
              schema: { $ref: "#/components/schemas/PlanItem" }
        "400": { description: Invalid input, content: { application/json: { schema: { $ref: "#/components/schemas/Error" } } } }
        "401": { description: Unauthorized }
        "404": { description: Plan not found }
  /api/plans/{id}/items/{item_id}:
    patch:
      summary: Update an item (status, claim)
      operationId: updatePlanItem
      security: [{ BearerAuth: [] }]
      parameters:
        - { $ref: "#/components/parameters/PlanId" }
        - { $ref: "#/components/parameters/ItemId" }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/UpdateItemInput" }
      responses:
        "204": { description: Updated }
        "401": { description: Unauthorized }
        "404": { description: Not found }
    delete:
      summary: Delete an item
      operationId: deletePlanItem
      security: [{ BearerAuth: [] }]
      parameters:
        - { $ref: "#/components/parameters/PlanId" }
        - { $ref: "#/components/parameters/ItemId" }
      responses:
        "204": { description: Deleted }
        "401": { description: Unauthorized }
        "404": { description: Not found }
  /api/plans/{id}/items/{item_id}/dependencies:
    post:
      summary: Add a dependency between items (auto-blocks the dependent item)
      operationId: addItemDependency
      security: [{ BearerAuth: [] }]
      parameters:
        - { $ref: "#/components/parameters/PlanId" }
        - { $ref: "#/components/parameters/ItemId" }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [depends_on_item_id]
              properties:
                depends_on_item_id: { type: string }
      responses:
        "200":
          description: Updated dependent item
          content:
            application/json:
              schema: { $ref: "#/components/schemas/PlanItem" }
        "401": { description: Unauthorized }
        "404": { description: Not found }
        "409": { description: Dependency cycle detected }
  /api/plans/{id}/items/{item_id}/dependencies/{depends_on_id}:
    delete:
      summary: Remove an item dependency (re-evaluates blocked state)
      operationId: removeItemDependency
      security: [{ BearerAuth: [] }]
      parameters:
        - { $ref: "#/components/parameters/PlanId" }
        - { $ref: "#/components/parameters/ItemId" }
        - { name: depends_on_id, in: path, required: true, schema: { type: string } }
      responses:
        "204": { description: Removed }
        "401": { description: Unauthorized }
        "404": { description: Not found }
  /api/plans/{id}/dependencies:
    post:
      summary: Add a plan-to-plan dependency (auto-blocks the dependent plan)
      operationId: addPlanDependency
      security: [{ BearerAuth: [] }]
      parameters: [{ $ref: "#/components/parameters/PlanId" }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [depends_on_plan_id]
              properties:
                depends_on_plan_id: { type: string }
      responses:
        "200":
          description: Updated dependent plan
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Plan" }
        "401": { description: Unauthorized }
        "404": { description: Not found }
        "409": { description: Dependency cycle detected }
  /api/plans/{id}/dependencies/{depends_on_id}:
    delete:
      summary: Remove a plan-to-plan dependency
      operationId: removePlanDependency
      security: [{ BearerAuth: [] }]
      parameters:
        - { $ref: "#/components/parameters/PlanId" }
        - { name: depends_on_id, in: path, required: true, schema: { type: string } }
      responses:
        "204": { description: Removed }
        "401": { description: Unauthorized }
        "404": { description: Not found }

components:
  parameters:
    SessionId:  { name: id, in: path, required: true, schema: { type: string } }
    EntryId:    { name: id, in: path, required: true, schema: { type: string } }
    PlanId:     { name: id, in: path, required: true, schema: { type: string } }
    ItemId:     { name: item_id, in: path, required: true, schema: { type: string } }
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      description: Send the API key as the bearer token.
  schemas:
    Error:
      type: object
      properties:
        error: { type: string }
    Workspace:
      type: object
      properties:
        id: { type: string }
        name: { type: string }
        created_at: { type: string, format: date-time }
    WorkspaceCreateInput:
      type: object
      required: [id]
      properties:
        id: { type: string, description: "Same value agents use for workspace/workspace_id." }
        name: { type: string, description: Optional display name. }
    Status:
      type: string
      description: >
        Agent status. `stuck` and `orphaned` are set exclusively by the health
        checker; agents must not self-report them.
      enum:
        - pending
        - thinking
        - planning
        - running
        - editing
        - testing
        - waiting
        - blocked
        - paused
        - handoff
        - succeeded
        - failed
        - cancelled
        - stuck
        - orphaned
    ReportInput:
      type: object
      required: [agent_id, agent_type, workspace, status]
      properties:
        session_id: { type: string }
        agent_id: { type: string }
        agent_type: { type: string }
        workspace: { type: string }
        status: { $ref: "#/components/schemas/Status" }
        progress: { type: integer, minimum: 0, maximum: 100 }
        step_current: { type: integer, minimum: 0 }
        step_total: { type: integer, minimum: 0 }
        message: { type: string }
        snippet: { type: string }
        metadata: { type: object, additionalProperties: true }
        git_branch: { type: string }
    ReportResult:
      type: object
      properties:
        session_id: { type: string }
        event_id: { type: string }
    AgentState:
      type: object
      properties:
        session_id: { type: string }
        agent_id: { type: string }
        agent_type: { type: string }
        workspace: { type: string }
        status: { $ref: "#/components/schemas/Status" }
        progress: { type: integer }
        step_current: { type: integer }
        step_total: { type: integer }
        message: { type: string }
        snippet: { type: string }
        metadata: { type: object, additionalProperties: true }
        updated_at: { type: string, format: date-time }
        original_status: { $ref: "#/components/schemas/Status" }
        stuck_at: { type: string, format: date-time }
        git_branch: { type: string }
    Event:
      allOf:
        - $ref: "#/components/schemas/AgentState"
        - type: object
          properties:
            id: { type: string }
            created_at: { type: string, format: date-time }
    SessionSummary:
      type: object
      properties:
        id: { type: string }
        title: { type: string }
        workspace: { type: string }
        status: { $ref: "#/components/schemas/Status" }
        agent_count: { type: integer }
        started_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }
    SessionDetail:
      allOf:
        - $ref: "#/components/schemas/SessionSummary"
        - type: object
          properties:
            agents:
              type: array
              items: { $ref: "#/components/schemas/AgentState" }
            events:
              type: array
              items: { $ref: "#/components/schemas/Event" }
    BlackboardScope:
      type: string
      enum: [session, branch, project]
    BlackboardEntryType:
      type: string
      enum: [finding, decision, bug, debt, warning, context]
      description: "`bug` and `debt` are floating (always visible across branches)."
    BlackboardEntry:
      type: object
      properties:
        id: { type: string }
        scope: { $ref: "#/components/schemas/BlackboardScope" }
        workspace_id: { type: string }
        branch_name: { type: string }
        session_id: { type: string }
        entry_type: { $ref: "#/components/schemas/BlackboardEntryType" }
        title: { type: string }
        content: { type: string }
        code_ref: { type: string }
        author_agent_id: { type: string }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }
    BlackboardWriteInput:
      type: object
      required: [scope, entry_type, title, author_agent_id]
      properties:
        scope: { $ref: "#/components/schemas/BlackboardScope" }
        workspace_id: { type: string }
        branch_name: { type: string, description: Required when scope is branch. }
        session_id: { type: string, description: Required when scope is session. }
        entry_type: { $ref: "#/components/schemas/BlackboardEntryType" }
        title: { type: string }
        content: { type: string }
        code_ref: { type: string }
        author_agent_id: { type: string }
    BlackboardWriteResult:
      type: object
      properties:
        id: { type: string }
        scope: { $ref: "#/components/schemas/BlackboardScope" }
    BlackboardBundle:
      type: object
      properties:
        entries:
          type: array
          items: { $ref: "#/components/schemas/BlackboardEntry" }
        markdown_bundle: { type: string }
    PlanStatus:
      type: string
      enum: [active, completed, archived, blocked]
    ItemStatus:
      type: string
      enum: [pending, in_progress, done, blocked]
    PlanItem:
      type: object
      properties:
        id: { type: string }
        plan_id: { type: string }
        title: { type: string }
        description: { type: string }
        phase: { type: string }
        status: { $ref: "#/components/schemas/ItemStatus" }
        position: { type: integer }
        claimed_by_agent_id: { type: string }
        depends_on:
          type: array
          items: { type: string }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }
    Plan:
      type: object
      properties:
        id: { type: string }
        name: { type: string }
        branch_name: { type: string }
        workspace_id: { type: string }
        description: { type: string }
        status: { $ref: "#/components/schemas/PlanStatus" }
        author_agent_id: { type: string }
        items:
          type: array
          items: { $ref: "#/components/schemas/PlanItem" }
        depends_on:
          type: array
          items: { type: string }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }
    CreatePlanInput:
      type: object
      required: [name, author_agent_id]
      properties:
        name: { type: string }
        branch_name: { type: string }
        workspace_id: { type: string }
        description: { type: string }
        author_agent_id: { type: string }
    UpdatePlanInput:
      type: object
      properties:
        name: { type: string }
        description: { type: string }
        status: { $ref: "#/components/schemas/PlanStatus" }
    CreateItemInput:
      type: object
      required: [title]
      properties:
        title: { type: string }
        description: { type: string }
        phase: { type: string }
        position: { type: integer, description: Omit to append at the end. }
        depends_on:
          type: array
          items: { type: string }
    UpdateItemInput:
      type: object
      properties:
        status: { $ref: "#/components/schemas/ItemStatus" }
        claimed_by_agent_id:
          type: string
          nullable: true
          description: "null = leave unchanged, empty = release claim, set = claim."
