openapi: "3.1.0"
info:
  title: skopos
  version: "1.0.0"
  description: API for skopos service
servers:
  - url: http://localhost:8080
    description: Local development
paths:
  /health:
    get:
      summary: Health check
      operationId: healthCheck
      responses:
        "200":
          description: Service is healthy
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
  /metrics:
    get:
      summary: Application metrics
      operationId: getMetrics
      responses:
        "200":
          description: Current metrics
  /api/reports:
    post:
      summary: Report an agent status update
      operationId: reportStatus
      security:
        - ApiKeyAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ReportInput"
      responses:
        "201":
          description: Report accepted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReportResult"
        "400":
          description: Invalid report
        "401":
          description: Unauthorized
  /api/sessions:
    get:
      summary: List sessions
      operationId: listSessions
      responses:
        "200":
          description: Session summaries
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/SessionSummary"
  /api/sessions/{id}:
    get:
      summary: Get a session by ID
      operationId: getSession
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Session detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SessionDetail"
        "404":
          description: Session not found
  /api/sessions/{id}/events:
    get:
      summary: List session events
      operationId: listSessionEvents
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Session events
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Event"
components:
  securitySchemes:
    ApiKeyAuth:
      type: apiKey
      in: header
      name: X-API-Key
  schemas:
    ReportInput:
      type: object
      required:
        - agent_id
        - agent_type
        - workspace
        - status
      properties:
        session_id:
          type: string
        agent_id:
          type: string
        agent_type:
          type: string
        workspace:
          type: string
        status:
          $ref: "#/components/schemas/Status"
        progress:
          type: integer
          minimum: 0
          maximum: 100
        step_current:
          type: integer
          minimum: 0
        step_total:
          type: integer
          minimum: 0
        message:
          type: string
        snippet:
          type: string
        metadata:
          type: object
          additionalProperties: true
    ReportResult:
      type: object
      properties:
        session_id:
          type: string
        event_id:
          type: string
    SessionSummary:
      type: object
      properties:
        id:
          type: string
        title:
          type: string
        workspace:
          type: string
        status:
          $ref: "#/components/schemas/Status"
        agent_count:
          type: integer
        started_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
        agents:
          type: array
          items:
            $ref: "#/components/schemas/AgentState"
    SessionDetail:
      allOf:
        - $ref: "#/components/schemas/SessionSummary"
        - type: object
          properties:
            events:
              type: array
              items:
                $ref: "#/components/schemas/Event"
    AgentState:
      type: object
      properties:
        session_id:
          type: string
        agent_id:
          type: string
        agent_type:
          type: string
        workspace:
          type: string
        status:
          $ref: "#/components/schemas/Status"
        progress:
          type: integer
        step_current:
          type: integer
        step_total:
          type: integer
        message:
          type: string
        snippet:
          type: string
        metadata:
          type: object
          additionalProperties: true
        updated_at:
          type: string
          format: date-time
    Event:
      allOf:
        - $ref: "#/components/schemas/AgentState"
        - type: object
          properties:
            id:
              type: string
            created_at:
              type: string
              format: date-time
    Status:
      type: string
      enum:
        - pending
        - thinking
        - planning
        - running
        - editing
        - testing
        - waiting
        - blocked
        - paused
        - handoff
        - succeeded
        - failed
        - cancelled
